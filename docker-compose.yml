services:
  sql-prep:
    build: .
    container_name: datawrangler_sql_prep
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: >
      sh -c "python main.py setup --engine duckdb --force &&
             echo 'DuckDB practice database is ready at artifacts/screening_prep.duckdb' &&
             tail -f /dev/null"
    tty: true
    stdin_open: true
